version: 2

models:
  - name: int_order_items_enriched
    description: '{{ doc("int_order_items_enriched") }}'
    columns:
      - name: order_item_id
        description: Primary key. One row per order item.
        tests:
          - unique
          - not_null
      - name: order_id
        tests:
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: sale_price
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
      - name: item_status
        tests:
          - not_null
          - accepted_values:
              values: ['Cancelled', 'Complete', 'Processing', 'Returned', 'Shipped']
      - name: product_category
        tests:
          - not_null
      - name: acquisition_channel
        tests:
          - not_null
      - name: is_revenue_item
        tests:
          - not_null
      - name: is_returned
        tests:
          - not_null
      - name: is_cancelled
        tests:
          - not_null
